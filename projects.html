<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | Trevlin Olckers</title>

  <link rel="stylesheet" href="css/projects.css" />
</head>

<body>

  <!-- NAVIGATION -->
  <header class="nav">
    <nav class="nav-inner">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="index.html#featured">Featured</a>
      <a href="index.html#about">About</a>
      <a href="index.html#connect">Let’s Connect</a>
    </nav>
  </header>

  <main class="projects-page">
    <section class="panels">

      <!-- PANEL 1: PRINT -->
      <button
        class="panel"
        type="button"
        aria-label="Open Print Design gallery"
        data-category="Print Design"
        data-images='[
          {
            "src":"images/projects/print/vuma-thankyou-cards.jpg",
            "title":"Vuma ISP Gift — Thank You Cards",
            "date":"2024",
            "text":"Designed a premium thank-you card set for customer gifting. Strong hierarchy, clean brand presence, and print-ready output."
          },
          {
            "src":"images/projects/print/internal-posters.png",
            "title":"Maziv Internal Posters",
            "date":"2025",
            "text":"A modular internal comms poster style used across multiple messages. Built for clarity, consistency, and fast rollout."
          },
          {
            "src":"images/projects/print/golfday-invite.png",
            "title":"DFA Golf Day Invite Poster",
            "date":"2024",
            "text":"Event invite poster designed for quick scanning, strong CTA visibility, and on-brand layout rhythm."
          },
          {
            "src":"images/projects/print/ceo-award.png",
            "title":"CEO Awards Certificate (Concept)",
            "date":"2024",
            "text":"Certificate design with a premium corporate feel. Focus on alignment, typography, and print finish readiness."
          }
        ]'
        style="--panel-image: url('images/projects/print/vuma-thankyou-cards.jpg');"
      >
        <span class="panel-title">Print<br>Design</span>
      </button>

      <!-- PANEL 2: WEB -->
      <button
        class="panel"
        type="button"
        aria-label="Open Web Design gallery"
        data-category="Web Design"
        data-images='[
          {
            "src":"images/projects/web/wellness-hub.png",
            "title":"Internal Wellness Page",
            "date":"2025",
            "text":"Designed a clean portfolio structure with strong hierarchy, breathing space, and consistent typography to support quick scanning."
          },
          {
            "src":"images/projects/web/wellness-hub-2.png",
            "title":"Landing Page Wireframe",
            "date":"July 2025",
            "text":"Built a landing page layout focused on clarity and flow — headline, supporting copy, and CTA placed for fast comprehension."
          },
          {
            "src":"images/projects/web/web-portfolio (1).png",
            "title":"Portfolio website",
            "date":"August 2025",
            "text":"Created a reusable section system so the site stays consistent across pages. Spacing, type scale, and grid rules kept aligned."
          }

        ]'
        style="--panel-image: url('images/projects/web/wellness-hub.png'); --panel-hover-image: url('images/projects/web/wellness-hub-2.png');"
        style="--panel-image: url('images/projects/web/wellness-hub.png'); --panel-hover-image: url('images/projects/web/wellness-hub-2.png');"
      >
        <span class="panel-title">Web<br>Design</span>
      </button>

      <!-- PANEL 3: DIGITAL -->
      <button
        class="panel"
        type="button"
        aria-label="Open Digital Design gallery"
        data-category="Digital Design"
        data-images='[
          {
            "src":"images/projects/digital/your-voice-matters-screensaver.png",
            "title":"Internal Screensaver: Your Voice Matters",
            "date":"2024",
            "text":"Developed a screensaver series with strong message hierarchy and brand alignment for internal comms."
          },
          {
            "src":"images/projects/digital/youth-day-screensaver.png",
            "title":"Youth Day Screensaver",
            "date":"2025",
            "text":"Designed a hero banner layout with safe zones, readable copy, and a clear CTA — optimised for multiple screen sizes."
          },
          {
            "src":"images/projects/digital/vom-screensaver.png",
            "title":"Newsletter Graphic Tiles",
            "date":"November 2024",
            "text":"Created a modular tile set for newsletters. Clean layout rules made it fast to reuse while staying visually consistent."
          }
        ]'
        style="--panel-image: url('https://picsum.photos/seed/digitalCover/1200/1600');"
      >
        <span class="panel-title">Digital<br>Design</span>
      </button>

    </section>
  </main>

  <!-- ===== GALLERY / MODAL ===== -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Project gallery">

    <!-- dim background -->
    <div class="lightbox-backdrop" data-close></div>

    <!-- arrows OUTSIDE grey container -->
    <button class="nav-arrow left" type="button" aria-label="Previous image" id="prevBtn">‹</button>
    <button class="nav-arrow right" type="button" aria-label="Next image" id="nextBtn">›</button>

    <!-- floating container -->
    <div class="lightbox-card" role="document">
      <button class="lightbox-close" type="button" aria-label="Close gallery" data-close>×</button>

      <div class="lightbox-grid">

        <!-- Left: Image -->
        <div class="lb-image-wrap">
          <img id="lightboxImg" alt="">
        </div>

        <!-- Right: White info card -->
        <aside class="lb-info">
          <h2 class="lb-title" id="lbTitle">Project title</h2>
          <p class="lb-date" id="lbDate">Month Year</p>

          <div class="lb-text" id="lbText">
            Project description goes here.
          </div>

          <div class="lb-count" id="lbCount">1 / 3</div>
        </aside>

      </div>
    </div>

  </div>

  <!-- JS (always just before </body>) -->
  <script src="js/projects.js"></script>

</body>
</html>
